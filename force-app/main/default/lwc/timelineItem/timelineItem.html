<template>
    <div class="timeline_container">

            <template if:true={isCaseType}>
                <li>
                    <div class="slds-timeline__item_expandable slds-timeline__item_case slds-timeline__item_all">
                        <span class="slds-assistive-text">case</span>
                        <div class="slds-media">
                            <div class="media_figure">
                                <lightning-button-icon icon-name="utility:chevronleft" variant="bare"
                                    class="slds-p-left_x-small chevronFocus slds-button" size="medium"
                                    onclick={openCloseContainer}>
                                </lightning-button-icon>
                                <div class="slds-icon_container slds-icon_container_all slds-icon-standard-case slds-timeline__icon"
                                    title="case">
                                    <lightning-icon class="slds-icon slds-icon_small" icon-name="standard:case"
                                        size="small"></lightning-icon>
                                </div>
                            </div>

                            <div class="slds-media__body bodyContainer">
                                <div class="slds-grid slds-grid_align-spread slds-timeline__trigger">
                                    <div
                                        class="slds-grid slds-grid_vertical-align-center slds-truncate_container_75 slds-no-space">
                                        <h3 class="slds-truncate" title={_title}>
                                            <a href="javascript:void(0);" onclick={navigateToObject}>
                                                <strong>{_title}</strong>
                                            </a>
                                        </h3>
                                    </div>
                                    <div class="slds-timeline__actions slds-timeline__actions_inline">
                                        <p class="timeline_date">{dateTime.time} | {dateTime.date}</p>
                                    </div>
                                </div>
                                <p class="subTitle slds-m-horizontal_xx-small">{_subTitle}</p>
                                <article
                                    class="slds-box slds-timeline__item_details slds-theme_shade slds-m-top_x-small slds-m-horizontal_xx-small slds-p-around_medium"
                                    id="case-item-narrow1" aria-hidden="false">
                                    <template for:each={_body} for:item="field">
                                        <ul key={field.fieldName} class="slds-list_horizontal slds-wrap">
                                            <li
                                                class="slds-grid slds-grid_vertical slds-p-bottom_small">
                                                <span
                                                    class="slds-text-title slds-p-bottom_x-small fieldName">{field.fieldName}</span>
                                                <span class="subTitle bodyField">{field.value}</span>
                                            </li>
                                        </ul>
                                    </template>

                            </div>

                    </div>
                </li>
            </template>
