<template>
   
   <!-- lightning button for open modal window -->
       <template if:true={isShownbtn}>
           <lightning-button 
               label={label.CheckFreeLinesbtn}
               title={label.CheckFreeLinesbtn}
               onclick={checkIVRLines} 
               class="">
           </lightning-button>        
       </template>

       <!-- modal start -->        
       <template if:true={isShowModal}>
          <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
             <div class="slds-modal__container modalContainer">
                <!-- modal header start -->
                <header class="slds-modal__header">
                   <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}>
                      <lightning-icon icon-name="utility:close"
                         alternative-text="close"
                         variant="inverse"
                         size="small" >
                       </lightning-icon>
                      <span class="slds-assistive-text">Close</span>
                   </button>
                   <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">בחר תורים להשמעת הנחיות</h2>
                </header>
                <!-- modal body start -->
                <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1" >
                    <lightning-datatable
                       key-field="id"
                       data={appointmentData}
                       columns={columns}
                       onrowselection={getSelectedName}
                       selected-rows={appointmentIds}
                       onsort={updateColumnSorting} 
                       sorted-by={sortedBy} 
                       sorted-direction={sortedDirection}
                       resize-column-disabled>
                 </lightning-datatable>                     
                </div>
                <!-- modal footer start-->
                <footer class="slds-modal__footer">
                    <lightning-button 
                       label={label.playInstructionsbtn}
                       title={label.playInstructionsbtn}
                       onclick={sendInfoToIVR} 
                       class="slds-m-left_x-small">
                    </lightning-button>  
                    <lightning-button 
                       label={label.cancelePlayInstructions}
                       title={label.cancelePlayInstructions}
                       onclick={closeModal} 
                       class="slds-m-left_x-small">
                    </lightning-button>       
                </footer>
             </div>
          </section>
          <div class="slds-backdrop slds-backdrop_open"></div>
       </template>
       <!-- modal end -->       
</template>
