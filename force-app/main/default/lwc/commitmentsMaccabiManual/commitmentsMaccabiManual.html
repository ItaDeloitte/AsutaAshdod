<template>
    <template if:true={isMaccabi}>        
        <lightning-button 
            label={label.SendReferralBtn}
            title={label.SendReferralBtn}
            onclick={sendReferralToMaccabi}
            class="slds-m-left_x-small">
        </lightning-button>
    </template>
    <template if:true={isFromAccount}>
        <lightning-button 
            label={label.CreateAppBtn}
            title={label.CreateAppBtn}
            onclick={createAppointment}
            class="slds-m-left_x-small">
        </lightning-button>
        <div class="loaderHolder">
            <template if:false={loaded}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>
        </div>
    </template>  
</template>
