<template>
  <div class={className} role="alert">
    <span class="slds-assistive-text">{theme}</span>
    <div>
      <slot></slot>
    </div>
    <div if:true={closeable} class="slds-notify__close">
      <lightning-button-icon icon-name="utility:close" variant={buttonIconVariant} onclick={closeHandler}
        alternative-text="Close"></lightning-button-icon>
    </div>
  </div>
</template>
