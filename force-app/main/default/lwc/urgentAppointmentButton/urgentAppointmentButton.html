<template>
   <template if:true={isShownbtn}>
       <lightning-button label={labels.UrgentAppointment} onclick={openModal} class="">
       </lightning-button>        
   </template>
  <!-- modal start -->        
  <template if:true={isShowModal}>
   <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true" aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
       <div class="slds-modal__container modalContainer">
          <!-- modal header start -->
          <header class="slds-modal__header">
             <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title={labels.Close} onclick={closeModal}>
                <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse" size="small" > </lightning-icon>
                <span class="slds-assistive-text">{labels.Close}</span>
             </button>
             <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">{labels.UrgentAppointmentTitle}</h2>
          </header>
          <!-- modal body start -->      
          <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1" >
              <lightning-input name="urgent" type="checkbox" data-id="editField" label={labels.IsUrgent}
                 onchange={onIsUrgentChange} checked={isUrgentValue} class="validate"></lightning-input>  
              <template if:true={UrgentReasonPicklist.data}>
                 <lightning-combobox name="urgentReason" data-id="editField" label={labels.UrgentReason} 
                    options={UrgentReasonPicklist.data.values} onchange={onUrgentReasonChange} class="validate"
                    message-when-value-missing={labels.CompleteThisField} required={reqUrgentReasonField}>
                 </lightning-combobox>
              </template>
              <template if:true={reqOthUrgentReasonField}>
                 <lightning-textarea name="otherUrgentReason" data-id="editField"
                  onchange={onOthUrgentReasonChange} label={labels.OtherUrgentReason} maxlength="255" message-when-too-long="A maximum of 255 characters are allowed." 
                   message-when-value-missing={labels.CompleteThisField} required={reqOthUrgentReasonField} class="validate">
                 </lightning-textarea>
               </template>              
          </div>
          <!-- modal footer start-->
          <footer class="slds-modal__footer">
              <lightning-button variant="neutral" onclick={closeModal} 
              title={labels.Cancel} label={labels.Cancel} class="slds-m-left_x-small"> 
              </lightning-button>                 
              <lightning-button  variant="neutral" label={labels.Submit}
                 title={labels.Submit} onclick={submitModal} class="slds-m-left_x-small">
              </lightning-button>       
          </footer>
       </div>
       <lightning-spinner if:true={isLoading} variant="brand" size="small"></lightning-spinner>
    </section>    
    <div class="slds-backdrop slds-backdrop_open"></div>
  </template>
  <!-- modal end -->       
</template>
